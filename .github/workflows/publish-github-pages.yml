name: Publish GitHub Pages

# Official GitHub Actions Pages deployment (upload artifact + deploy-pages).
# Repo Settings → Pages → Source must be "GitHub Actions".

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel stale in-flight deploys — fixes "Deployment failed, try again later"
# when multiple runs queue (actions/deploy-pages#418).
concurrency:
  group: pages-build
  cancel-in-progress: true

jobs:
  build:
    name: Build SPA artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://build.aicountly.org/api/v1' }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME || 'AICOUNTLY Build' }}
        run: |
          npm ci
          npm run build
          test -f dist/index.html

      - name: Prepare Pages artifact
        working-directory: web/dist
        run: |
          touch .nojekyll
          cp index.html 404.html
          # Ensure deploy-pages can read every file (actions/deploy-pages#58).
          chmod -c -R +rX .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Done
        run: |
          echo "Site URL: ${{ steps.deployment.outputs.page_url }}"
