name: Deploy Production via SSH

# cPanel layout (mirrors reach-aicountly):
#   web/dist/*     →  ${PROD_SFTP_REMOTE_ROOT}/     (typically public_html/)
#   server-php/*   →  ${PROD_SFTP_REMOTE_ROOT}/api/ (CodeIgniter front controller)
#
# api/.env is NEVER deployed from CI and NEVER modified — existing server .env
# is backed up before api/ is replaced and restored immediately after.

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-build
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to cPanel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      REMOTE_ROOT: ${{ secrets.PROD_SFTP_REMOTE_ROOT }}
      SITE_HOST: build.aicountly.org

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (web/dist for public_html)
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
        run: |
          # Base URL must end at /api — the SPA client appends /v1/...
          API_URL="${VITE_API_URL:-https://build.aicountly.org/api}"
          API_URL="${API_URL%/}"
          API_URL="${API_URL%/v1}"
          export VITE_API_URL="$API_URL"
          echo "Building with VITE_API_URL=${VITE_API_URL}"
          npm ci
          npm run build
          test -f dist/index.html
          test -f dist/.htaccess || cp public/.htaccess dist/.htaccess
          echo "Built $(find dist -type f | wc -l) files in web/dist (→ public_html)"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, curl, pgsql, pdo_pgsql

      - name: Install server-php Composer dependencies (production)
        working-directory: server-php
        run: |
          composer install --no-dev --no-interaction --no-progress --optimize-autoloader --prefer-dist
          test -d vendor/codeigniter4/framework || (echo "CI4 framework missing after composer install" && exit 1)
          echo "vendor/ ready ($(du -sh vendor | cut -f1)) — bundled into api deploy (no server composer needed)"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PROD_SFTP_HOST }}
          SSH_PORT: ${{ secrets.PROD_SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config <<EOF
          Host cpanel-prod
            HostName ${SSH_HOST}
            Port ${SSH_PORT}
            User ${{ secrets.PROD_SFTP_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            RequestTTY no
            BatchMode yes
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
            LogLevel ERROR
          EOF
          chmod 600 ~/.ssh/config

      - name: Resolve document root (public_html)
        run: |
          set -euo pipefail
          MARKER="build-root-$(date +%s).txt"
          echo "$MARKER" > "$MARKER"
          DETECTED=""

          # PROD_SFTP_REMOTE_ROOT is usually "public_html" on cPanel.
          CANDIDATES="public_html ."
          if [ -n "${REMOTE_ROOT}" ] && [ "${REMOTE_ROOT}" != "." ] && [ "${REMOTE_ROOT}" != "auto" ] && [ "${REMOTE_ROOT}" != "public_html" ]; then
            CANDIDATES="$CANDIDATES ${REMOTE_ROOT}"
          fi

          for TARGET in $CANDIDATES; do
            echo "Probing deploy target: ${TARGET}"
            ssh -T cpanel-prod "mkdir -p '${TARGET}'" 2>/dev/null || true
            scp -F "$HOME/.ssh/config" -o BatchMode=yes "$MARKER" "cpanel-prod:${TARGET}/" 2>/dev/null || continue
            if curl -fsS "https://${SITE_HOST}/${MARKER}" 2>/dev/null | grep -q "$MARKER"; then
              DETECTED="$TARGET"
              echo "Document root confirmed: ${TARGET} (public_html equivalent)"
              ssh -T cpanel-prod "rm -f '${TARGET}/${MARKER}'" || true
              break
            fi
            ssh -T cpanel-prod "rm -f '${TARGET}/${MARKER}'" 2>/dev/null || true
          done
          rm -f "$MARKER"

          if [ -z "$DETECTED" ]; then
            # Fall back to the secret value when HTTP probe fails (e.g. DNS not live yet).
            if [ -n "${REMOTE_ROOT}" ] && [ "${REMOTE_ROOT}" != "auto" ]; then
              DETECTED="${REMOTE_ROOT}"
              echo "HTTP probe inconclusive — using PROD_SFTP_REMOTE_ROOT=${DETECTED}"
            else
              DETECTED="public_html"
              echo "Defaulting to public_html"
            fi
          fi

          echo "DEPLOY_ROOT=${DETECTED}" >> "$GITHUB_ENV"
          ssh -T cpanel-prod "mkdir -p '${DETECTED}/api/writable/'{logs,cache,session,uploads}; echo 'Deploy root:' '${DETECTED}'; ls -la '${DETECTED}' | head -15"

      - name: Deploy SPA (web/dist → public_html)
        run: |
          set -euo pipefail
          echo "Uploading web/dist → ${DEPLOY_ROOT}/ (public_html)..."
          timeout 600 scp -r -F "$HOME/.ssh/config" -o BatchMode=yes \
            web/dist/. "cpanel-prod:${DEPLOY_ROOT}/"
          ssh -T cpanel-prod "test -f '${DEPLOY_ROOT}/index.html'"
          echo "index.html confirmed in ${DEPLOY_ROOT}/"

      - name: Deploy API (server-php → public_html/api)
        run: |
          set -euo pipefail
          echo "Packaging server-php/ as api/ (includes vendor/ from CI composer install)..."
          tar -C server-php \
            --exclude='./.env' \
            --exclude='./.git' \
            --exclude='./writable/logs' \
            --exclude='./writable/cache' \
            --exclude='./writable/session' \
            --exclude='./writable/uploads' \
            -czf api.tgz .
          ls -lh api.tgz
          timeout 600 scp -F "$HOME/.ssh/config" -o BatchMode=yes \
            api.tgz "cpanel-prod:${DEPLOY_ROOT}/api.tgz"
          echo "Extracting into ${DEPLOY_ROOT}/api/ ..."
          ssh -T cpanel-prod "set -e
            cd '${DEPLOY_ROOT}'
            test -f api.tgz
            PRESERVE_ENV='${DEPLOY_ROOT}/.build-api.env.preserve'
            if [ -f api/.env ]; then
              cp -a api/.env \"\$PRESERVE_ENV\"
              echo 'Backed up api/.env — deploy will not modify production secrets'
            fi
            rm -rf api.staging
            mkdir -p api.staging/writable/logs api.staging/writable/cache api.staging/writable/session api.staging/writable/uploads
            if tar -xzf api.tgz -C api.staging; then
              echo 'Extracted with tar -xzf'
            elif gzip -dc api.tgz | tar -xf - -C api.staging; then
              echo 'Extracted with gzip | tar'
            else
              echo 'ERROR: Could not extract api.tgz on server'
              exit 1
            fi
            rm -f api.staging/.env 2>/dev/null || true
            rm -rf api
            mv api.staging api
            if [ -f \"\$PRESERVE_ENV\" ]; then
              cp -a \"\$PRESERVE_ENV\" api/.env
              rm -f \"\$PRESERVE_ENV\"
              chmod 600 api/.env 2>/dev/null || true
              echo 'Restored api/.env unchanged — deploy did not modify .env'
            fi
            rm -f api.tgz
            test -f api/index.php || { echo 'ERROR: api/index.php missing'; exit 1; }
            test -f api/.htaccess || { echo 'ERROR: api/.htaccess missing'; exit 1; }
            ls -la api | head -20"
          echo "server-php deployed as ${DEPLOY_ROOT}/api/"

      - name: Migrate database and seed superadmin
        timeout-minutes: 15
        env:
          SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
          SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          escaped_email=$(printf '%s' "$SUPER_ADMIN_EMAIL" | sed "s/'/'\"'\"'/g")
          escaped_pass=$(printf '%s' "$SUPER_ADMIN_PASSWORD" | sed "s/'/'\"'\"'/g")
          timeout 840 ssh -T cpanel-prod bash <<REMOTE
          set -e
          cd '${DEPLOY_ROOT}/api'
          test -d vendor/codeigniter4/framework || { echo 'ERROR: vendor/ missing on server — CI should bundle composer output'; exit 1; }
          mkdir -p writable/cache writable/session writable/logs writable/uploads
          chmod -R 775 writable/cache writable/session writable/logs writable/uploads 2>/dev/null || \
            chmod -R 777 writable/cache writable/session writable/logs writable/uploads
          if [ ! -f .env ]; then
            echo 'ERROR: missing api/.env on server — create from .env.example before deploy'
            exit 1
          fi
          echo 'api/.env present — deploy does not modify server secrets'
          php spark migrate --no-interaction
          if [ -n '${escaped_email}' ] && [ -n '${escaped_pass}' ]; then
            export SUPER_ADMIN_EMAIL='${escaped_email}'
            export SUPER_ADMIN_PASSWORD='${escaped_pass}'
            export SUPER_ADMIN_NAME='Build Superadmin'
            php spark db:seed OwnerSeeder --no-interaction
          else
            echo 'SUPER_ADMIN_EMAIL / SUPER_ADMIN_PASSWORD secrets not set — skipping seed.'
          fi
          REMOTE

      - name: Verify site, API, and login endpoint
        run: |
          set -euo pipefail
          echo "Checking homepage (public_html/index.html)..."
          curl -fsS "https://${SITE_HOST}/" | grep -qi '<html'
          echo "Homepage OK"
          echo "Checking API health (public_html/api/health)..."
          curl -fsS "https://${SITE_HOST}/api/health" | grep -q 'aicountly-build-api'
          echo "API health OK"
          echo "Checking login route (expect JSON, not HTML)..."
          LOGIN_CODE="$(curl -sS -o /tmp/login.json -w '%{http_code}' \
            -X POST "https://${SITE_HOST}/api/v1/auth/login" \
            -H 'Content-Type: application/json' \
            -d '{"email":"probe@example.com","password":"probe"}')"
          head -c 200 /tmp/login.json
          echo ""
          grep -qE '"success"|"message"|aicountly-build-api' /tmp/login.json || {
            echo "ERROR: Login endpoint returned HTML instead of JSON (HTTP ${LOGIN_CODE})."
            exit 1
          }
          echo "Login route OK (HTTP ${LOGIN_CODE})"
